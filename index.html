<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard NR 01 - DRPS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>Diagnóstico de Riscos Psicossociais - NR 01</h1>
    <div class="chart-container">
        <canvas id="meuGrafico"></canvas>
    </div>
</div>

<script>
    const URL_API = 'SUA_URL_DO_WEB_APP_AQUI';

    async function carregarDashboard() {
        try {
            const response = await fetch(URL_API);
            const dados = await response.json();

            // Preparando os dados para o gráfico
            const labels = dados.map(item => item.topico);
            const valores = dados.map(item => item.gravidade);

            const ctx = document.getElementById('meuGrafico').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Média de Gravidade por Tópico',
                        data: valores,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y', // Gráfico horizontal para ler melhor os tópicos
                    responsive: true,
                    scales: {
                        x: { beginAtZero: true, max: 3 } // Escala de 1 a 3 conforme seu modelo
                    }
                }
            });
        } catch (erro) {
            console.error('Erro ao carregar dados:', erro);
        }
    }

    carregarDashboard();
</script>
</body>
</html>
