<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma DRPS - NR 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">NR-01 <span class="text-blue-400">Digital</span></h1>
            <div class="flex gap-4">
                <select id="filtroSetor" class="bg-slate-700 border-none rounded px-3 py-1 text-sm focus:ring-2 focus:ring-blue-500">
                    <option value="Geral">Visão Geral (Empresa)</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="Produção">Produção</option>
                    <option value="Logística">Logística</option>
                </select>
                <button onclick="carregarDados()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm transition">Atualizar</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Status do Setor</p>
                <h3 id="statusSetor" class="text-2xl font-black text-gray-800">Carregando...</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Pontos Críticos</p>
                <h3 id="pontosCriticos" class="text-2xl font-black text-gray-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Tópicos Estáveis</p>
                <h3 id="pontosSeguros" class="text-2xl font-black text-gray-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Ações Pendentes</p>
                <h3 class="text-2xl font-black text-gray-800">Ver Plano</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h4 class="text-gray-700 font-bold mb-4">Perfil de Gravidade (13 Tópicos)</h4>
                <canvas id="chartRadar"></canvas>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <h4 class="text-gray-700 font-bold mb-4">Panorama da Matriz de Risco</h4>
                <div class="max-w-[300px] mx-auto">
                    <canvas id="chartDoughnut"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby6Ak6rVEcrj4lTC-Ub0awF3-b1_ChwQPLdiSbFCaud_7pmAlWlRueN35tJO_SusIDzMQ/exec';
        let radarChart, doughnutChart;

        async function carregarDados() {
            const setor = document.getElementById('filtroSetor').value;
            try {
                const response = await fetch(`${API_URL}?setor=${setor}`);
                const data = await response.json();
                atualizarInterface(data);
            } catch (e) { console.error("Erro ao buscar dados", e); }
        }

        function atualizarInterface(data) {
            // Atualiza Cards
            document.getElementById('statusSetor').innerText = data.setor;
            document.getElementById('pontosCriticos').innerText = data.resumoRisco.critico + data.resumoRisco.alto;
            document.getElementById('pontosSeguros').innerText = data.resumoRisco.baixo;

            const labels = data.topicos.map(t => t.nome.split('-')[0]); // Pega apenas "Tópico X"
            const gravidade = data.topicos.map(t => t.gravidade);

            // Destruir gráficos existentes para recriar com novos dados
            if(radarChart) radarChart.destroy();
            if(doughnutChart) doughnutChart.destroy();

            // Radar Chart
            radarChart = new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Nível de Gravidade',
                        data: gravidade,
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: '#3b82f6',
                        pointBackgroundColor: '#1d4ed8'
                    }]
                },
                options: { scales: { r: { beginAtZero: true, max: 3 } } }
            });

            // Doughnut Chart
            doughnutChart = new Chart(document.getElementById('chartDoughnut'), {
                type: 'doughnut',
                data: {
                    labels: ['Baixo', 'Médio', 'Alto', 'Crítico'],
                    datasets: [{
                        data: [data.resumoRisco.baixo, data.resumoRisco.medio, data.resumoRisco.alto, data.resumoRisco.critico],
                        backgroundColor: ['#22c55e', '#eab308', '#ef4444', '#7e22ce']
                    }]
                }
            });
        }

        carregarDados();
    </script>
</body>
</html>
